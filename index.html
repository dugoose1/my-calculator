<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Calculator</title>
  <link rel="stylesheet" href="style.css" />

   <!-- 👇 add it here -->
  <style>
    html { background: transparent; }
  </style>
</head>
<body>

  <!-- 🎨 CUSTOMIZATION PANEL: Upload your own background image -->
  <div class="customize-panel">
    <label for="bgUpload">📁 Upload Background:</label>
    <input type="file" id="bgUpload" accept="image/*" />

    <label for="btnUpload">🔲 Upload Button Texture:</label>
    <input type="file" id="btnUpload" accept="image/*" />

    <label for="accentColor">🎨 Accent Color:</label>
    <input type="color" id="accentColor" value="#00e5ff" />
  </div>

  <!-- CALCULATOR -->
  <!-- SLOWPOKE FRAME -->
<div class="calculator-frame">

  <!-- Your drawing as the actual background image -->
  <img class="slowpoke-bg" src="images/body.jpg" alt="Slowpoke frame" />

  <!-- Calculator content sits on top inside the white rectangle -->
  <div class="calculator" id="calculator">
    <div class="display">
      <span class="display-expression" id="expression"></span>
      <span class="display-result" id="result">0</span>
    </div>
    <div class="buttons">
      <button class="btn special" data-action="power">⏻</button>
      <button class="btn special" data-action="sqrt">√</button>
      <button class="btn special" data-action="negate">±</button>
      <button class="btn operator" data-action="clear">C</button>
      <button class="btn digit" data-value="7">7</button>
      <button class="btn digit" data-value="8">8</button>
      <button class="btn digit" data-value="9">9</button>
      <button class="btn operator" data-action="divide">÷</button>
      <button class="btn digit" data-value="4">4</button>
      <button class="btn digit" data-value="5">5</button>
      <button class="btn digit" data-value="6">6</button>
      <button class="btn operator" data-action="multiply">×</button>
      <button class="btn digit" data-value="1">1</button>
      <button class="btn digit" data-value="2">2</button>
      <button class="btn digit" data-value="3">3</button>
      <button class="btn operator" data-action="subtract">−</button>
      <button class="btn digit" data-value="0">0</button>
      <button class="btn digit" data-value=".">.</button>
      <button class="btn operator" data-action="equals">=</button>
      <button class="btn operator" data-action="add">+</button>
    </div>
  </div>

</div>

  <script src="script.js"></script>
</body>
</html>
